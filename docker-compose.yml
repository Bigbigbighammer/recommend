version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rec_db
      POSTGRES_USER: rec
      POSTGRES_PASSWORD: rec123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rec -d rec_db"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      retries: 15

  python-inference:
    build:
      context: .
      dockerfile: Dockerfile.python
    ports:
      - "8081:8081"
    environment:
      YOUTUBE_DNN_DATA_DIR: /app/data
      YOUTUBE_DNN_HISTORY_WINDOW: 30
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; import json; r=urllib.request.urlopen('http://localhost:8081/api/health'); d=json.loads(r.read()); assert d['status']=='healthy'\" "]
      interval: 10s
      retries: 5

  java:
    build:
      context: .
      dockerfile: Dockerfile.java
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rec_db
      SPRING_DATASOURCE_USERNAME: rec
      SPRING_DATASOURCE_PASSWORD: rec123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      RECOMMEND_RPC_INFERENCE_BASE_URL: http://python-inference:8081
      RECOMMEND_EMBEDDING_ITEM_EMB_PATH: /app/data/item_emb.npy
      RECOMMEND_EMBEDDING_MOVIE_IDS_PATH: /app/data/movie_ids.npy
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      python-inference:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8088:80"
    volumes:
      - ./data/posters:/usr/share/nginx/html/posters
    depends_on:
      - java

volumes:
  pgdata:
  esdata:
