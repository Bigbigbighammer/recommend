version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rec_db
      POSTGRES_USER: rec
      POSTGRES_PASSWORD: rec123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rec -d rec_db"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q green || grep -q yellow"]
      interval: 10s
      retries: 10

  python-inference:
    build:
      context: .
      dockerfile: Dockerfile.python
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8081/api/health | grep -q healthy"]
      interval: 10s
      retries: 5

  java:
    build:
      context: .
      dockerfile: Dockerfile.java
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rec_db
      SPRING_DATASOURCE_USERNAME: rec
      SPRING_DATASOURCE_PASSWORD: rec123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_ELASTICSEARCH_CLIENT_REACTIVE_ENDPOINTS: elasticsearch:9200
      RECOMMEND_RPC_INFERENCE_BASE_URL: http://python-inference:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      python-inference:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - java

volumes:
  pgdata:
  esdata:
