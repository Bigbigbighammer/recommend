server:
  port: 8080

spring:
  application:
    name: rec-recommend-service
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rec_db}
    username: ${SPRING_DATASOURCE_USERNAME:rec}
    password: ${SPRING_DATASOURCE_PASSWORD:rec123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

recommend:
  embedding:
    item-emb-path: ${RECOMMEND_EMBEDDING_ITEM_EMB_PATH:/app/data/item_emb.npy}
    movie-ids-path: ${RECOMMEND_EMBEDDING_MOVIE_IDS_PATH:/app/data/movie_ids.npy}

  rpc:
    client: http
    inference:
      base-url: ${RECOMMEND_RPC_INFERENCE_BASE_URL:http://python-inference:8080}
      connect-timeout: 500
      read-timeout: 2000
      max-retries: 1

  recall-fusion:
    weights: ${RECOMMEND_RECALL_FUSION_WEIGHTS:itemcf=2.0,usercf=1.8,ease=1.25,seqcf=1.1,bpr=0.0,swing=0.7,user_preference=0.5,item_embedding=0.3,youtubednn=0.4,popular=0.05}
    rrf-k: 60

  recall-artifacts:
    itemcf-path: ${RECOMMEND_RECALL_ITEMCF_PATH:/app/data/itemcf_sim.csv}
    seqcf-path: ${RECOMMEND_RECALL_SEQCF_PATH:/app/data/seqcf_sim.csv}
    ease-path: ${RECOMMEND_RECALL_EASE_PATH:/app/data/ease_sim.csv}
    swing-path: ${RECOMMEND_RECALL_SWING_PATH:/app/data/swing_sim.csv}
    usercf-sim-path: ${RECOMMEND_RECALL_USERCF_SIM_PATH:/app/data/usercf_sim.csv}
    usercf-items-path: ${RECOMMEND_RECALL_USERCF_ITEMS_PATH:/app/data/user_positive_items.csv}
    bpr-user-emb-path: ${RECOMMEND_RECALL_BPR_USER_EMB_PATH:/app/data/bpr_user_emb.npy}
    bpr-user-ids-path: ${RECOMMEND_RECALL_BPR_USER_IDS_PATH:/app/data/bpr_user_ids.npy}
    bpr-item-emb-path: ${RECOMMEND_RECALL_BPR_ITEM_EMB_PATH:/app/data/bpr_item_emb.npy}
    bpr-movie-ids-path: ${RECOMMEND_RECALL_BPR_MOVIE_IDS_PATH:/app/data/bpr_movie_ids.npy}

  strategy:
    recall:
      user-preference:
        enabled: true
      youtubednn:
        enabled: true
      item-embedding:
        enabled: true
      itemcf:
        enabled: true
      seqcf:
        enabled: true
      ease:
        enabled: true
      swing:
        enabled: true
      usercf:
        enabled: true
      bpr:
        enabled: false
      popular:
        enabled: true
      global-trending:
        enabled: false
    ranking:
      deepfm:
        enabled: true
      fallback:
        enabled: true
    reranking:
      genre-dispersion:
        enabled: true
      decade-dispersion:
        enabled: true
    coldstart:
      ucb-genre:
        enabled: true
      preferred-genre:
        enabled: true
      popular-recent:
        enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
